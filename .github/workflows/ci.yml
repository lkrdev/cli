name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          version: latest

      - name: Install dependencies
        run: |
          uv sync --extra all

      - name: Run with pytest
        run: |
          uv run pytest tests/test_dependency_resolution.py -v

      - name: Run ruff
        run: |
          uv run ruff check .

      - name: Run ty
        run: |
          uv run ty check

